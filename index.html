<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    font-family: var(--font-sans, "Segoe UI", system-ui, sans-serif);
    background: var(--color-background-tertiary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem;
  }
  .wrap {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  h2 {
    font-size: 16px;
    font-weight: 500;
    color: var(--color-text-primary);
    text-align: center;
  }
  .cam-box {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    border-radius: var(--border-radius-lg);
    overflow: hidden;
    background: #000;
    border: 0.5px solid var(--color-border-tertiary);
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  #canvas {
    display: none;
  }
  .frame-corner {
    position: absolute;
    width: 28px;
    height: 28px;
    border-color: var(--color-text-info);
    border-style: solid;
  }
  .fc-tl {
    top: 12px;
    left: 12px;
    border-width: 3px 0 0 3px;
    border-radius: 4px 0 0 0;
  }
  .fc-tr {
    top: 12px;
    right: 12px;
    border-width: 3px 3px 0 0;
    border-radius: 0 4px 0 0;
  }
  .fc-bl {
    bottom: 12px;
    left: 12px;
    border-width: 0 0 3px 3px;
    border-radius: 0 0 0 4px;
  }
  .fc-br {
    bottom: 12px;
    right: 12px;
    border-width: 0 3px 3px 0;
    border-radius: 0 0 4px 0;
  }
  .scan-bar {
    position: absolute;
    left: 16px;
    right: 16px;
    height: 2px;
    background: var(--color-background-info);
    border-radius: 1px;
    opacity: 0;
    transition: opacity 0.3s;
    animation: sweep 2s ease-in-out infinite;
  }
  .scan-bar.on {
    opacity: 1;
  }
  @keyframes sweep {
    0% {
      top: 16px;
    }
    50% {
      top: calc(100% - 16px);
    }
    100% {
      top: 16px;
    }
  }
  .badge {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-size: 12px;
    padding: 4px 14px;
    border-radius: 20px;
    background: rgba(0, 0, 0, 0.55);
    color: rgba(255, 255, 255, 0.75);
    border: 0.5px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(6px);
    transition: all 0.25s;
  }
  .badge.ok {
    background: rgba(22, 163, 74, 0.25);
    border-color: rgba(22, 163, 74, 0.5);
    color: #86efac;
  }
  .badge.err {
    background: rgba(220, 38, 38, 0.2);
    border-color: rgba(220, 38, 38, 0.4);
    color: #fca5a5;
  }
  .init-msg {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(0, 0, 0, 0.6);
  }
  .init-msg p {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.55);
    text-align: center;
    padding: 0 1rem;
  }
  .spin {
    width: 32px;
    height: 32px;
    border: 2.5px solid rgba(255, 255, 255, 0.15);
    border-top-color: var(--color-text-info);
    border-radius: 50%;
    animation: sp 0.7s linear infinite;
  }
  @keyframes sp {
    to {
      transform: rotate(360deg);
    }
  }
  button {
    width: 100%;
    padding: 10px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover {
    background: var(--color-background-primary);
  }
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  button.primary {
    background: var(--color-background-info);
    color: var(--color-text-primary);
    border-color: var(--color-border-info);
  }
  button.primary:hover {
    opacity: 0.88;
  }
  .result-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    overflow: hidden;
    display: none;
  }
  .result-card.show {
    display: block;
  }
  .rh {
    padding: 0.875rem 1rem;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-success);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .rh i {
    font-size: 18px;
    color: var(--color-text-success);
  }
  .rh span {
    font-size: 14px;
    font-weight: 500;
    color: var(--color-text-success);
  }
  .rb {
    padding: 0.5rem 0;
  }
  .row {
    display: flex;
    gap: 0.75rem;
    padding: 0.5rem 1rem;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .row:last-child {
    border-bottom: none;
  }
  .lbl {
    font-size: 11px;
    color: var(--color-text-tertiary);
    min-width: 80px;
    padding-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }
  .val {
    font-size: 13px;
    color: var(--color-text-primary);
    font-weight: 500;
    word-break: break-all;
  }
  .raw-box {
    margin: 0.5rem 1rem;
    padding: 0.75rem;
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md);
    font-size: 12px;
    color: var(--color-text-secondary);
    word-break: break-all;
    font-family: var(--font-mono);
    line-height: 1.5;
    display: none;
  }
  .raw-box.show {
    display: block;
  }
  .foot {
    display: flex;
    gap: 0.5rem;
    padding: 0.75rem 1rem;
    border-top: 0.5px solid var(--color-border-tertiary);
  }
  .foot button {
    padding: 8px;
    font-size: 12px;
  }
</style>

<div class="wrap">
  <h2>Quét QR Code</h2>

  <div class="cam-box" id="camBox">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="frame-corner fc-tl"></div>
    <div class="frame-corner fc-tr"></div>
    <div class="frame-corner fc-bl"></div>
    <div class="frame-corner fc-br"></div>
    <div class="scan-bar" id="bar"></div>
    <div class="badge" id="badge">Sẵn sàng</div>
    <div class="init-msg" id="initMsg">
      <p>Nhấn <strong>Bắt đầu</strong> để mở camera</p>
    </div>
  </div>

  <div style="display: flex; gap: 0.5rem">
    <button class="primary" id="btnStart" onclick="start()">Bắt đầu</button>
    <button id="btnStop" disabled onclick="reset()">Dừng / Quét lại</button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="rh">
      <i class="ti ti-circle-check" aria-hidden="true"></i>
      <span id="rTitle">Đọc QR thành công</span>
    </div>
    <div class="rb" id="rb"></div>
    <div class="raw-box" id="rawBox"></div>
    <div class="foot">
      <button onclick="toggleRaw()">Xem raw</button>
      <button onclick="copyRaw()">Sao chép</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d", { willReadFrequently: true });
  const bar = document.getElementById("bar");
  const badge = document.getElementById("badge");
  const initMsg = document.getElementById("initMsg");
  const btnStart = document.getElementById("btnStart");
  const btnStop = document.getElementById("btnStop");

  let stream = null,
    raf = null,
    running = false,
    raw = "";

  const SCALES = [1, 1.5, 2];

  const REGIONS = [
    { x: 0, y: 0, w: 1, h: 1 },
    { x: 0, y: 0.4, w: 0.5, h: 0.6 },
    { x: 0.5, y: 0.4, w: 0.5, h: 0.6 },
    { x: 0, y: 0, w: 0.5, h: 0.6 },
    { x: 0.5, y: 0, w: 0.5, h: 0.6 },
  ];

  function toGray(d) {
    for (let i = 0; i < d.data.length; i += 4) {
      const g =
        (d.data[i] * 0.299 + d.data[i + 1] * 0.587 + d.data[i + 2] * 0.114) | 0;
      d.data[i] = d.data[i + 1] = d.data[i + 2] = g;
    }
    return d;
  }

  function threshold(d, t) {
    for (let i = 0; i < d.data.length; i += 4) {
      const v = d.data[i] > t ? 255 : 0;
      d.data[i] = d.data[i + 1] = d.data[i + 2] = v;
    }
    return d;
  }

  const tmp = document.createElement("canvas");
  const tctx = tmp.getContext("2d", { willReadFrequently: true });

  function tryDecode(vw, vh, region, scale, mode) {
    const sx = Math.floor(vw * region.x),
      sy = Math.floor(vh * region.y);
    const sw = Math.floor(vw * region.w),
      sh = Math.floor(vh * region.h);
    const dw = Math.floor(sw * scale),
      dh = Math.floor(sh * scale);
    tmp.width = dw;
    tmp.height = dh;
    tctx.drawImage(video, sx, sy, sw, sh, 0, 0, dw, dh);
    let img = tctx.getImageData(0, 0, dw, dh);
    if (mode === 1) img = toGray(img);
    if (mode === 2) {
      img = toGray(img);
      threshold(img, 128);
    }
    return jsQR(img.data, dw, dh, { inversionAttempts: "attemptBoth" });
  }

  function tick() {
    if (!running) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      const vw = video.videoWidth,
        vh = video.videoHeight;
      outer: for (const r of REGIONS) {
        for (const s of SCALES) {
          for (let m = 0; m < 3; m++) {
            const code = tryDecode(vw, vh, r, s, m);
            if (code?.data) {
              found(code.data);
              return;
            }
          }
        }
      }
    }
    raf = requestAnimationFrame(tick);
  }

  async function start() {
    btnStart.disabled = true;
    initMsg.innerHTML = '<div class="spin"></div><p>Đang mở camera…</p>';
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: "environment" },
          width: { ideal: 1920 },
          height: { ideal: 1080 },
        },
      });
      video.srcObject = stream;
      await video.play();
      initMsg.style.display = "none";
      bar.classList.add("on");
      running = true;
      btnStop.disabled = false;
      setBadge("Đang quét…", "");
      const track = stream.getVideoTracks()[0];
      const caps = track.getCapabilities?.() ?? {};
      if (caps.zoom)
        track.applyConstraints({
          advanced: [{ zoom: Math.min(1.5, caps.zoom.max) }],
        });
      raf = requestAnimationFrame(tick);
    } catch (e) {
      initMsg.innerHTML =
        '<p style="color:#fca5a5">Không mở được camera.<br>' +
        e.message +
        "</p>";
      btnStart.disabled = false;
    }
  }

  function found(data) {
    running = false;
    cancelAnimationFrame(raf);
    stopCam();
    bar.classList.remove("on");
    setBadge("Quét thành công!", "ok");
    raw = data;
    renderResult(data);
  }

  function renderResult(data) {
    const parts = data.split("|");
    let html = "";
    if (parts.length >= 4) {
      const fmt = (s) =>
        s && s.length === 8
          ? `${s.slice(0, 2)}/${s.slice(2, 4)}/${s.slice(4)}`
          : s;
      const rows = [
        ["Số CCCD", parts[0]],
        ["Số cũ", parts[1] || "—"],
        ["Họ tên", parts[2]],
        ["Ngày sinh", fmt(parts[3])],
        ["Giới tính", parts[4]],
        ["Địa chỉ", parts[5]],
        ["Ngày cấp", fmt(parts[6])],
      ];
      rows.forEach(([l, v]) => {
        if (v)
          html += `<div class="row"><span class="lbl">${l}</span><span class="val">${v}</span></div>`;
      });
      document.getElementById("rTitle").textContent = "Đọc CCCD thành công";
    } else {
      html = `<div class="row"><span class="lbl">Nội dung</span><span class="val">${data}</span></div>`;
      document.getElementById("rTitle").textContent = "Quét QR thành công";
    }
    document.getElementById("rb").innerHTML = html;
    document.getElementById("rawBox").textContent = data;
    document.getElementById("resultCard").classList.add("show");
  }

  function toggleRaw() {
    document.getElementById("rawBox").classList.toggle("show");
  }

  function copyRaw() {
    if (!raw) return;
    navigator.clipboard.writeText(raw).catch(() => {});
  }

  function reset() {
    running = false;
    cancelAnimationFrame(raf);
    stopCam();
    bar.classList.remove("on");
    initMsg.innerHTML = "<p>Nhấn <strong>Bắt đầu</strong> để mở camera</p>";
    initMsg.style.display = "flex";
    setBadge("Sẵn sàng", "");
    document.getElementById("resultCard").classList.remove("show");
    document.getElementById("rawBox").classList.remove("show");
    document.getElementById("rb").innerHTML = "";
    btnStart.disabled = false;
    btnStop.disabled = true;
    raw = "";
  }

  function stopCam() {
    stream?.getTracks().forEach((t) => t.stop());
    stream = null;
  }
  function setBadge(t, cls) {
    badge.textContent = t;
    badge.className = "badge" + (cls ? " " + cls : "");
  }
  window.addEventListener("beforeunload", stopCam);
</script>
