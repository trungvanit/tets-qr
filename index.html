<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>QR CCCD Scanner</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #app {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        /* vùng focus QR */

        .scan-box {
            position: absolute;
            width: 220px;
            height: 220px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            border-radius: 20px;
            border: 3px solid #22c55e;
            box-shadow:
                0 0 0 9999px rgba(0,0,0,.55),
                0 0 20px rgba(34,197,94,.8);
        }

        /* góc */

        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: #22c55e;
            border-style: solid;
        }

        .tl {
            top: -3px;
            left: -3px;
            border-width: 4px 0 0 4px;
            border-top-left-radius: 16px;
        }

        .tr {
            top: -3px;
            right: -3px;
            border-width: 4px 4px 0 0;
            border-top-right-radius: 16px;
        }

        .bl {
            bottom: -3px;
            left: -3px;
            border-width: 0 0 4px 4px;
            border-bottom-left-radius: 16px;
        }

        .br {
            bottom: -3px;
            right: -3px;
            border-width: 0 4px 4px 0;
            border-bottom-right-radius: 16px;
        }

        /* line scan */

        .scan-line {
            position: absolute;
            left: 10px;
            right: 10px;
            height: 3px;
            background: #22c55e;
            box-shadow: 0 0 10px #22c55e;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% {
                top: 15px;
            }

            100% {
                top: calc(100% - 15px);
            }
        }

        .bottom-ui {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            z-index: 10;
        }

        .status {
            text-align: center;
            margin-bottom: 14px;
            color: rgba(255,255,255,.85);
            font-size: 15px;
        }

        .result {
            background: rgba(15,23,42,.92);
            border-radius: 16px;
            padding: 16px;
            backdrop-filter: blur(10px);
            display: none;
        }

        .row {
            margin-bottom: 8px;
            font-size: 14px;
        }

        .row span {
            color: #94a3b8;
        }

        button {
            width: 100%;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            background: #2563eb;
            color: white;
            cursor: pointer;
            margin-top: 12px;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>

<div id="app">

    <video id="video" playsinline></video>

    <div class="overlay">

        <div class="scan-box">

            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>

            <div class="scan-line"></div>

        </div>

    </div>

    <div class="bottom-ui">

        <div class="status" id="status">
            Đưa mã QR vào giữa màn hình
        </div>

        <div class="result" id="result">

            <div class="row">
                <span>CCCD:</span>
                <b id="cccd"></b>
            </div>

            <div class="row">
                <span>Họ tên:</span>
                <b id="name"></b>
            </div>

            <div class="row">
                <span>Ngày sinh:</span>
                <b id="dob"></b>
            </div>

            <div class="row">
                <span>Giới tính:</span>
                <b id="gender"></b>
            </div>

            <div class="row">
                <span>Địa chỉ:</span>
                <b id="address"></b>
            </div>

            <button id="scanAgain">
                Quét lại
            </button>

        </div>

    </div>

</div>

<script type="module">

    import QrScanner from "https://unpkg.com/qr-scanner@1.4.2/qr-scanner.min.js";

    const video = document.getElementById("video");

    const statusText = document.getElementById("status");

    const resultBox = document.getElementById("result");

    const cccdEl = document.getElementById("cccd");
    const nameEl = document.getElementById("name");
    const dobEl = document.getElementById("dob");
    const genderEl = document.getElementById("gender");
    const addressEl = document.getElementById("address");

    const scanAgainBtn = document.getElementById("scanAgain");

    let scanner;
    let scanned = false;

    function formatDate(str) {

        if (!str || str.length !== 8) {
            return str;
        }

        return `${str.slice(0,2)}/${str.slice(2,4)}/${str.slice(4)}`;
    }

    function parseCCCD(raw) {

        const parts = raw.split("|");

        return {
            cccd: parts[0] || "",
            name: parts[2] || "",
            dob: formatDate(parts[3]),
            gender: parts[4] || "",
            address: parts[5] || ""
        };
    }

    async function startScanner() {

        scanned = false;

        resultBox.style.display = "none";

        statusText.innerText = "Đang mở camera...";

        scanner = new QrScanner(
            video,

            result => {

                if (scanned) return;

                scanned = true;

                scanner.stop();

                statusText.innerText = "Quét thành công";

                const data = parseCCCD(result.data);

                cccdEl.innerText = data.cccd;
                nameEl.innerText = data.name;
                dobEl.innerText = data.dob;
                genderEl.innerText = data.gender;
                addressEl.innerText = data.address;

                resultBox.style.display = "block";
            },

            {
                preferredCamera: "environment",

                maxScansPerSecond: 20,

                returnDetailedScanResult: true,

                /* CHỈ scan vùng giữa */

                calculateScanRegion(video) {

                    const smallest = Math.min(
                        video.videoWidth,
                        video.videoHeight
                    );

                    const size = smallest * 0.45;

                    return {
                        x: (video.videoWidth - size) / 2,
                        y: (video.videoHeight - size) / 2,
                        width: size,
                        height: size,
                    };
                },
            }
        );

        try {

            await scanner.start();

            statusText.innerText =
                "Đưa QR CCCD vào ô giữa";

        } catch (e) {

            console.error(e);

            statusText.innerText =
                "Không mở được camera";
        }
    }

    scanAgainBtn.addEventListener("click", () => {

        scanner.destroy();

        startScanner();
    });

    startScanner();

</script>

</body>
</html>
