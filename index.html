<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR CCCD Scanner</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #000;
        overflow: hidden;
        font-family: Arial, sans-serif;
        color: white;
      }

      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      canvas { display: none; }

      #overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      #svgOverlay {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      /* scan line sits inside the visual guide box */
      #guide-box {
        position: absolute;
        width: 240px;
        height: 240px;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        overflow: hidden;
        pointer-events: none;
      }

      .scan-line {
        position: absolute;
        left: 0; right: 0;
        height: 2px;
        background: #22c55e;
        box-shadow: 0 0 10px #22c55e;
        animation: scanAnim 2s linear infinite;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .scan-line.active { opacity: 1; }

      @keyframes scanAnim {
        from { top: 0; }
        to   { top: 100%; }
      }

      .bottom-ui {
        position: absolute;
        left: 20px; right: 20px; bottom: 30px;
        z-index: 10;
      }

      .status {
        text-align: center;
        margin-bottom: 14px;
        font-size: 15px;
        text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      }

      .result {
        display: none;
        background: rgba(15, 23, 42, 0.92);
        border-radius: 18px;
        padding: 16px;
        backdrop-filter: blur(10px);
      }

      .row { margin-bottom: 8px; font-size: 14px; }
      .row span { color: #94a3b8; }

      button {
        width: 100%;
        border: none;
        padding: 14px;
        border-radius: 14px;
        background: #2563eb;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 12px;
      }
      button:hover { background: #1d4ed8; }
    </style>
  </head>
  <body>
    <div id="app">
      <video id="video" playsinline></video>
      <canvas id="canvas"></canvas>

      <div id="overlay">
        <svg id="svgOverlay" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <mask id="hole">
              <rect width="100%" height="100%" fill="white"/>
              <rect id="maskHole" rx="20" fill="black"/>
            </mask>
          </defs>

          <!-- dark vignette with transparent hole -->
          <rect width="100%" height="100%" fill="rgba(0,0,0,0.55)" mask="url(#hole)"/>

          <!-- 4 corner brackets -->
          <polyline id="btl" fill="none" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline id="btr" fill="none" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline id="bbl" fill="none" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline id="bbr" fill="none" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

        <!-- scan line (visual only, inside guide box) -->
        <div id="guide-box">
          <div class="scan-line active" id="scanLine"></div>
        </div>
      </div>

      <div class="bottom-ui">
        <div class="status" id="status">Đưa QR CCCD vào giữa màn hình</div>
        <div class="result" id="result">
          <div class="row"><span>CCCD: </span><b id="cccd"></b></div>
          <div class="row"><span>Họ tên: </span><b id="name"></b></div>
          <div class="row"><span>Ngày sinh: </span><b id="dob"></b></div>
          <div class="row"><span>Giới tính: </span><b id="gender"></b></div>
          <div class="row"><span>Địa chỉ: </span><b id="address"></b></div>
          <button id="scanAgain">Quét lại</button>
        </div>
      </div>
    </div>

    <script type="module">
      import QrScanner from "https://unpkg.com/qr-scanner@1.4.2/qr-scanner.min.js";

      const video      = document.getElementById("video");
      const canvas     = document.getElementById("canvas");
      const ctx        = canvas.getContext("2d", { willReadFrequently: true });
      const statusText = document.getElementById("status");
      const resultBox  = document.getElementById("result");
      const scanLine   = document.getElementById("scanLine");
      const guideBox   = document.getElementById("guide-box");
      const maskHole   = document.getElementById("maskHole");
      const btl = document.getElementById("btl");
      const btr = document.getElementById("btr");
      const bbl = document.getElementById("bbl");
      const bbr = document.getElementById("bbr");

      let scanning  = true;
      let snapLock  = false;

      // current interpolated bracket rect (screen px)
      let cx = 0, cy = 0, cw = 0, ch = 0;
      // target bracket rect
      let tx = 0, ty = 0, tw = 0, th = 0;

      const ARM = 30;   // arm length of each corner bracket
      const CR  = 10;   // inner corner offset (L-shape "radius")

      function drawBrackets(x, y, w, h) {
        btl.setAttribute("points", `${x+ARM},${y}  ${x+CR},${y}  ${x},${y+CR}  ${x},${y+ARM}`);
        btr.setAttribute("points", `${x+w-ARM},${y}  ${x+w-CR},${y}  ${x+w},${y+CR}  ${x+w},${y+ARM}`);
        bbl.setAttribute("points", `${x+ARM},${y+h}  ${x+CR},${y+h}  ${x},${y+h-CR}  ${x},${y+h-ARM}`);
        bbr.setAttribute("points", `${x+w-ARM},${y+h}  ${x+w-CR},${y+h}  ${x+w},${y+h-CR}  ${x+w},${y+h-ARM}`);

        maskHole.setAttribute("x",      x - 6);
        maskHole.setAttribute("y",      y - 6);
        maskHole.setAttribute("width",  w + 12);
        maskHole.setAttribute("height", h + 12);
      }

      function guideRect() {
        const r = guideBox.getBoundingClientRect();
        return { x: r.left, y: r.top, w: r.width, h: r.height };
      }

      function lerp(a, b, t) { return a + (b - a) * t; }

      function animLoop() {
        if (!snapLock) {
          const g = guideRect();
          tx = g.x; ty = g.y; tw = g.w; th = g.h;
        }
        const t = 0.14;
        cx = lerp(cx, tx, t);
        cy = lerp(cy, ty, t);
        cw = lerp(cw, tw, t);
        ch = lerp(ch, th, t);
        drawBrackets(cx, cy, cw, ch);
        requestAnimationFrame(animLoop);
      }

      /* ── Map QR corners (crop-canvas px) → screen px ── */
      function qrCornersToScreen(corners) {
        const vw   = video.videoWidth;
        const vh   = video.videoHeight;
        const size = Math.min(vw, vh) * 0.80;
        const offX = (vw - size) / 2;
        const offY = (vh - size) / 2;

        const vr   = video.getBoundingClientRect();
        const scX  = vr.width  / vw;
        const scY  = vr.height / vh;

        const pts = corners.map(p => ({
          x: vr.left + (p.x + offX) * scX,
          y: vr.top  + (p.y + offY) * scY,
        }));

        const xs = pts.map(p => p.x);
        const ys = pts.map(p => p.y);
        return {
          x: Math.min(...xs), y: Math.min(...ys),
          w: Math.max(...xs) - Math.min(...xs),
          h: Math.max(...ys) - Math.min(...ys),
        };
      }

      /* ── Camera ── */
      async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment",
            width:  { ideal: 1920 },
            height: { ideal: 1080 },
          },
        });
        video.srcObject = stream;
        await video.play();

        const track = stream.getVideoTracks()[0];
        try {
          await track.applyConstraints({
            advanced: [{ focusMode: "continuous" }, { zoom: 2 }],
          });
        } catch { /* ignore */ }

        // init bracket at guide position
        const g = guideRect();
        cx = g.x; cy = g.y; cw = g.w; ch = g.h;
        tx = cx; ty = cy; tw = cw; th = ch;
        drawBrackets(cx, cy, cw, ch);

        animLoop();
        requestAnimationFrame(tick);
      }

      /* ── Scan loop ── */
      async function tick() {
        if (!scanning) return;
        if (video.readyState !== video.HAVE_ENOUGH_DATA) {
          requestAnimationFrame(tick);
          return;
        }

        const vw   = video.videoWidth;
        const vh   = video.videoHeight;
        const size = Math.min(vw, vh) * 0.80;
        const sx   = (vw - size) / 2;
        const sy   = (vh - size) / 2;

        canvas.width  = size;
        canvas.height = size;
        ctx.drawImage(video, sx, sy, size, size, 0, 0, size, size);

        try {
          const result = await QrScanner.scanImage(canvas, {
            returnDetailedScanResult: true,
          });

          if (result?.data) {
            scanning = false;

            // snap bracket to QR position if corners available
            if (result.cornerPoints?.length === 4) {
              const PAD = 18;
              const r = qrCornersToScreen(result.cornerPoints);
              tx = r.x - PAD;
              ty = r.y - PAD;
              tw = r.w + PAD * 2;
              th = r.h + PAD * 2;
              snapLock = true;
            }

            // short delay so bracket animates to QR before showing card
            setTimeout(() => handleResult(result.data), 350);
            return;
          }
        } catch { /* not found yet */ }

        requestAnimationFrame(tick);
      }

      /* ── Parse CCCD ── */
      function formatDate(s) {
        if (!s || s.length !== 8) return s;
        return `${s.slice(0,2)}/${s.slice(2,4)}/${s.slice(4)}`;
      }

      function parseCCCD(raw) {
        const p = raw.split("|");
        return {
          cccd:    p[0] || "",
          name:    p[2] || "",
          dob:     formatDate(p[3]),
          gender:  p[4] || "",
          address: p[5] || "",
        };
      }

      function handleResult(raw) {
        statusText.innerText = "✅ Quét thành công";
        scanLine.classList.remove("active");

        const d = parseCCCD(raw);
        document.getElementById("cccd").innerText    = d.cccd;
        document.getElementById("name").innerText    = d.name;
        document.getElementById("dob").innerText     = d.dob;
        document.getElementById("gender").innerText  = d.gender;
        document.getElementById("address").innerText = d.address;
        resultBox.style.display = "block";
      }

      document.getElementById("scanAgain").addEventListener("click", () => {
        scanning  = true;
        snapLock  = false;
        resultBox.style.display = "none";
        statusText.innerText = "Đưa QR CCCD vào giữa màn hình";
        scanLine.classList.add("active");
        requestAnimationFrame(tick);
      });

      startCamera();
    </script>
  </body>
</html>
