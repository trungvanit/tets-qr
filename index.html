<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR CCCD Scanner</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #000;
        overflow: hidden;
        font-family: Arial, sans-serif;
        color: white;
      }

      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      canvas {
        display: none;
      }

      .overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .scan-box {
        position: absolute;

        width: 240px;
        height: 240px;

        left: 50%;
        top: 50%;

        transform: translate(-50%, -50%);

        border-radius: 24px;

        border: 3px solid #22c55e;

        box-shadow:
          0 0 0 9999px rgba(0, 0, 0, 0.55),
          0 0 30px rgba(34, 197, 94, 0.8);
      }

      .scan-line {
        position: absolute;

        left: 10px;
        right: 10px;

        height: 3px;

        background: #22c55e;

        box-shadow: 0 0 12px #22c55e;

        animation: scan 2s linear infinite;
      }

      @keyframes scan {
        from {
          top: 12px;
        }

        to {
          top: calc(100% - 12px);
        }
      }

      .bottom-ui {
        position: absolute;

        left: 20px;
        right: 20px;
        bottom: 30px;

        z-index: 10;
      }

      .status {
        text-align: center;
        margin-bottom: 14px;
        font-size: 15px;
      }

      .result {
        display: none;

        background: rgba(15, 23, 42, 0.92);

        border-radius: 18px;

        padding: 16px;

        backdrop-filter: blur(10px);
      }

      .row {
        margin-bottom: 8px;
        font-size: 14px;
      }

      .row span {
        color: #94a3b8;
      }

      button {
        width: 100%;

        border: none;

        padding: 14px;

        border-radius: 14px;

        background: #2563eb;

        color: white;

        font-size: 16px;

        font-weight: bold;

        cursor: pointer;

        margin-top: 12px;
      }

      button:hover {
        background: #1d4ed8;
      }
    </style>
  </head>

  <body>
    <div id="app">
      <video id="video" playsinline></video>

      <canvas id="canvas"></canvas>

      <div class="overlay">
        <div class="scan-box">
          <div class="scan-line"></div>
        </div>
      </div>

      <div class="bottom-ui">
        <div class="status" id="status">Đưa QR CCCD vào giữa màn hình</div>

        <div class="result" id="result">
          <div class="row">
            <span>CCCD:</span>
            <b id="cccd"></b>
          </div>

          <div class="row">
            <span>Họ tên:</span>
            <b id="name"></b>
          </div>

          <div class="row">
            <span>Ngày sinh:</span>
            <b id="dob"></b>
          </div>

          <div class="row">
            <span>Giới tính:</span>
            <b id="gender"></b>
          </div>

          <div class="row">
            <span>Địa chỉ:</span>
            <b id="address"></b>
          </div>

          <button id="scanAgain">Quét lại</button>
        </div>
      </div>
    </div>

    <script type="module">
      import QrScanner from "https://unpkg.com/qr-scanner@1.4.2/qr-scanner.min.js";

      const video = document.getElementById("video");

      const canvas = document.getElementById("canvas");

      const ctx = canvas.getContext("2d", {
        willReadFrequently: true,
      });

      const statusText = document.getElementById("status");

      const resultBox = document.getElementById("result");

      const cccdEl = document.getElementById("cccd");
      const nameEl = document.getElementById("name");
      const dobEl = document.getElementById("dob");
      const genderEl = document.getElementById("gender");
      const addressEl = document.getElementById("address");

      const scanAgainBtn = document.getElementById("scanAgain");

      let stream = null;

      let scanning = true;

      async function startCamera() {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment",

            width: {
              ideal: 1920,
            },

            height: {
              ideal: 1080,
            },
          },
        });

        video.srcObject = stream;

        await video.play();

        const track = stream.getVideoTracks()[0];

        /* autofocus + zoom */

        try {
          await track.applyConstraints({
            advanced: [
              {
                focusMode: "continuous",
              },

              {
                zoom: 2,
              },
            ],
          });
        } catch (e) {
          console.log("focus/zoom unsupported");
        }

        tick();
      }

      function preprocess(imageData) {
        const data = imageData.data;

        const contrast = 2;

        const threshold = 125;

        for (let i = 0; i < data.length; i += 4) {
          /* grayscale */

          let gray =
            data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;

          /* contrast */

          gray = (gray - 128) * contrast + 128;

          /* threshold */

          gray = gray > threshold ? 255 : 0;

          data[i] = gray;
          data[i + 1] = gray;
          data[i + 2] = gray;
        }

        return imageData;
      }

      async function tick() {
        if (!scanning) {
          return;
        }

        if (video.readyState !== video.HAVE_ENOUGH_DATA) {
          requestAnimationFrame(tick);

          return;
        }

        const vw = video.videoWidth;

        const vh = video.videoHeight;

        /*
            chỉ scan vùng giữa
        */

        const size = Math.min(vw, vh) * 0.35;

        const sx = (vw - size) / 2;

        const sy = (vh - size) / 2;

        canvas.width = size;

        canvas.height = size;

        /*
            crop camera
        */

        ctx.drawImage(video, sx, sy, size, size, 0, 0, size, size);

        /*
            lấy image data
        */

        let imageData = ctx.getImageData(0, 0, size, size);

        /*
            xử lý nền hoa văn CCCD
        */

        imageData = preprocess(imageData);

        ctx.putImageData(imageData, 0, 0);

        try {
          /*
                decode QR bằng qr-scanner
            */

          const result = await QrScanner.scanImage(canvas, {
            returnDetailedScanResult: true,
          });

          if (result?.data) {
            scanning = false;

            handleResult(result.data);

            return;
          }
        } catch (e) {
          /*
                chưa detect được
            */
        }

        requestAnimationFrame(tick);
      }

      function formatDate(str) {
        if (!str || str.length !== 8) {
          return str;
        }

        return `
            ${str.slice(0, 2)}/
            ${str.slice(2, 4)}/
            ${str.slice(4)}
        `.replace(/\s/g, "");
      }

      function parseCCCD(raw) {
        const parts = raw.split("|");

        return {
          cccd: parts[0] || "",

          name: parts[2] || "",

          dob: formatDate(parts[3]),

          gender: parts[4] || "",

          address: parts[5] || "",
        };
      }

      function handleResult(raw) {
        statusText.innerText = "Quét thành công";

        const data = parseCCCD(raw);

        cccdEl.innerText = data.cccd;

        nameEl.innerText = data.name;

        dobEl.innerText = data.dob;

        genderEl.innerText = data.gender;

        addressEl.innerText = data.address;

        resultBox.style.display = "block";
      }

      scanAgainBtn.addEventListener("click", () => {
        scanning = true;

        resultBox.style.display = "none";

        statusText.innerText = "Đưa QR CCCD vào giữa màn hình";

        tick();
      });

      startCamera();
    </script>
  </body>
</html>
